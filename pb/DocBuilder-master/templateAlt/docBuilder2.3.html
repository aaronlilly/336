<html>
<head>
  <title>Document Builder </title>

<!-- Bootstrap CSS  & JS--> 
<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.0/css/bootstrap.min.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.0/jquery.min.js"></script>
  
<!-- Jquery --> 
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.0/js/bootstrap.min.js"></script>
<!--Toastr Min CSS --> 
<link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/css/toastr.min.css'> 

<!--Toastr Min JS --> 
<script type='text/javascript' src='https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js'></script>
<!--Font Awesome --> 
<link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.8.2/css/all.css" integrity="sha384-oS3vJWv+0UjzBfQzYUhtDYW+Pj2yciDJxpsK1OYPAYjqT085Qq/1cq5FLXAZQ7Ay" crossorigin="anonymous">

<!-- Custom JS and CSS -->
<link rel="stylesheet" href="./css/docBuilder2.3.css">
<script type='text/javascript' src='./js/docBuilder2.3.js'></script>
<!-- End Custom JS and CSS -->

<body>

  <!DOCTYPE html>
<html>
<body>






<div id ="pageDiv">

<!-- Left hand side of page -->
    <div id ="leftDiv"> <span class="bsSuccess">Editor</span>  
<div id ="leftDivBox">  <!-- <a href="#"><img src=https://talonhit.com/wp-content/uploads/2016/09/talon-healthy-support.png" id="talonHeader"></a> -->
       Document Title 
       <input type="text" id="editorTitleHere" oninput= "titleHere()">

<br><br>

<span id="editorSummaryTocHeading" class="summaryTocHeading">Summary / Table of Contents</span> <input type="text" id="editorSummaryToc" oninput= "summaryToc()"><br>
      <br>
       <div id ="marginLeft">
 
  <span class ="headingBU"> Heading</span>
<input type="text" id="editorHeading1" oninput= "fHeading1()">
<span id="marginLeft">
<br>
<span id="marginLeft">
  Add A bullet  <span id='fAddBullet'><span class="badge badge-info">Click me to add bullet</span> </span> 

</span>

      </div>


        </div>
    </div>



<!-- /right hand side of page -->

<div id ="rightDiv"><span class="bsPrimary">Completed Doc</span> <span class="bsFireBrick" id="clickForCode" data-toggle="modal" data-target="#myModal">Click for Raw Code</span> 
    <div id ="rightDivBox">  <!-- <a href="#"><img src=https://talonhit.com/wp-content/uploads/2016/09/talon-healthy-support.png" id="talonHeader"></a> -->
       <p id="completeSummaryTOC" class="summaryTocHeading"></p> 


       <div id ="marginLeft"><p id="completeHeading1" class="headingBU"></p> <span id="completeAddBullet"> </span<br>
      
      

      </div>
    </div>
</div>


<!-- //code below -->

<div class="container">

  <!-- Trigger the modal with a button -->
 

  <!-- Modal -->
  <div class="modal fade" id="myModal" role="dialog">
    <div class="modal-dialog">
    
      <!-- Modal content-->
      <div class="modal-content">
        <div class="modal-header">
          <button type="button" class="close" data-dismiss="modal">&times;</button>
          <h4 class="modal-title">Code Below</h4>
        </div>
        <div class="modal-body">
          <p>  &ltHTML&gt <br> &ltHEAD&gt <br> &ltTITLE&gt <span id="codeTitleHere">  </span> &lt/TITLE&gt <br> &ltSTYLE&gt <br> &lt/STYLE&gt
            <br> &ltBODY&gt <br> SUMMARY <br> HEADING <br> <span id="codeAddBullet"> </span>





          </p>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-default" data-dismiss="modal">Close</button>
        </div>
      </div>
      
    </div>
  </div>
  
</div>

</div>
</body>
</html>
