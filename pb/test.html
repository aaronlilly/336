<script>
var ArrayD =[
"one","two"]


$(document).ready(function () {

$('#one').append("<div id='" + ArrayD[i] + "'>"+ ArrayD[i]+"</div>");
$('#two').append("<div id='" + ArrayD[i] + "'>"+ ArrayD[i]+"</div>");
 $("#xbox").append('<input type="checkbox" id="' +ArrayD[i] +'box">');

 $('#one').click(function(){

                        secondary(current);});

}



});

function secondary(){
	function secondary(cId){
//if checked
 if ($("#" + cId +"box").prop('checked')) 
   {
  chk(cId);
$('#'+cId).removeClass('isSelctd');
    }    
 //if not checked
   else{
   notchk(cId);
$('#'+cId).addClass('isSelctd');
     }
}  
}




function chk(cId){
$("#" + cId +"box").prop('checked',false);
}

function notchk(cid){
	$("#" + cId +"box").prop('checked',true);
}

</script>
